name: Sync & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repository
        run: |
          git remote add upstream https://github.com/STA1N156/RP-Hub.git || true
          git fetch upstream main
          git merge upstream/main --allow-unrelated-histories -X theirs || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync with upstream" || true
          git push || true

  build:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare build directory
        run: |
          mkdir -p build
          cp -r index.html character assets build/

      - name: Generate PWA manifest
        run: |
          echo '{' > build/manifest.json
          echo '  "name": "Roleplay Hub",' >> build/manifest.json
          echo '  "short_name": "RP Hub",' >> build/manifest.json
          echo '  "description": "一款纯前端运行的本地角色扮演（Roleplay）对话和角色卡生成工具",' >> build/manifest.json
          echo '  "start_url": "./",' >> build/manifest.json
          echo '  "display": "standalone",' >> build/manifest.json
          echo '  "background_color": "#f9fafb",' >> build/manifest.json
          echo '  "theme_color": "#1f2937",' >> build/manifest.json
          echo '  "icons": [' >> build/manifest.json
          echo '    {' >> build/manifest.json
          echo '      "src": "https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=1f2937",' >> build/manifest.json
          echo '      "sizes": "512x512",' >> build/manifest.json
          echo '      "type": "image/svg+xml",' >> build/manifest.json
          echo '      "purpose": "any"' >> build/manifest.json
          echo '    }' >> build/manifest.json
          echo '  ]' >> build/manifest.json
          echo '}' >> build/manifest.json

      - name: Generate Service Worker
        run: |
          echo "const CACHE_NAME = 'rp-hub-v1';" > build/sw.js
          echo "const urlsToCache = [" >> build/sw.js
          echo "  './'," >> build/sw.js
          echo "  './index.html'," >> build/sw.js
          echo "  './character/index.html'," >> build/sw.js
          echo "  './assets/css/styles.css'," >> build/sw.js
          echo "  './assets/js/app.js'," >> build/sw.js
          echo "  './assets/js/utils.js'" >> build/sw.js
          echo "];" >> build/sw.js
          echo "" >> build/sw.js
          echo "self.addEventListener('install', (event) => {" >> build/sw.js
          echo "  event.waitUntil(" >> build/sw.js
          echo "    caches.open(CACHE_NAME)" >> build/sw.js
          echo "      .then((cache) => cache.addAll(urlsToCache))" >> build/sw.js
          echo "  );" >> build/sw.js
          echo "});" >> build/sw.js
          echo "" >> build/sw.js
          echo "self.addEventListener('fetch', (event) => {" >> build/sw.js
          echo "  event.respondWith(" >> build/sw.js
          echo "    caches.match(event.request)" >> build/sw.js
          echo "      .then((response) => response || fetch(event.request))" >> build/sw.js
          echo "  );" >> build/sw.js
          echo "});" >> build/sw.js

      - name: Update index.html with PWA
        run: |
          if [ -f build/index.html ]; then
            # Create temporary files
            cp build/index.html build/temp.html
            
            # Add manifest, theme color, and iOS immersive status bar tags using relative paths
            sed -i 's|<title>Roleplay Hub</title>|<title>Roleplay Hub</title><link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#1f2937"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=1f2937">|' build/temp.html
            
            # Add service worker before </body> using relative path
            awk '/<\/body>/{print "    <script>if(\"serviceWorker\"in navigator){navigator.serviceWorker.register(\"./sw.js\")}</script>"}1' build/temp.html > build/index.html
            
            # Clean up
            rm build/temp.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
