name: Sync & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/STA1N156/RP-Hub.git || true
          git fetch upstream main
          if ! git merge upstream/main --allow-unrelated-histories --no-edit; then
            git merge --abort || true
            git rebase upstream/main || true
          fi
          git push || true

  build:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Build and generate PWA
        run: |
          # CDN 资源配置
          declare -a CDNS=(
            "tailwindcss:https://cdn.tailwindcss.com:./libs/tailwindcss.js"
            "vue:https://unpkg.com/vue@3/dist/vue.global.prod.js:./libs/vue.js"
            "marked:https://cdn.jsdelivr.net/npm/marked/marked.min.js:./libs/marked.js"
            "dompurify:https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js:./libs/purify.js"
            "sortable:https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js:./libs/sortable.js"
          )
          
          # PWA 配置
          PWA_NAME="Roleplay Hub"
          PWA_SHORT_NAME="RP Hub"
          PWA_THEME_COLOR="#1f2937"
          PWA_BG_COLOR="#f9fafb"
          PWA_ICON_URL="https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=1f2937"
          
          # 创建 build 目录
          mkdir -p build/libs
          cp -r index.html character assets build/
          
          # 下载 CDN 资源
          for cdn in "${CDNS[@]}"; do
            IFS=':' read -r name remote_url local_path <<< "$cdn"
            curl -sL "$remote_url" -o "build/$local_path"
            echo "Downloaded $name"
          done
          
          # 替换 index.html 中的 CDN URL
          cd build
          for cdn in "${CDNS[@]}"; do
            IFS=':' read -r name remote_url local_path <<< "$cdn"
            sed -i "s|$remote_url|$local_path|g" index.html
          done
          
          # 替换 character/index.html 中的 CDN URL
          if [ -f character/index.html ]; then
            for cdn in "${CDNS[@]}"; do
              IFS=':' read -r name remote_url local_path <<< "$cdn"
              local_rel_path="${local_path/.\//../}"
              sed -i "s|$remote_url|$local_rel_path|g" character/index.html
            done
          fi
          cd ..
          
          # 生成 manifest.json
          cat > build/manifest.json << MANIFESTEOF
          {
            "name": "$PWA_NAME",
            "short_name": "$PWA_SHORT_NAME",
            "description": "一款纯前端运行的本地角色扮演（Roleplay）对话和角色卡生成工具",
            "start_url": "./",
            "display": "standalone",
            "background_color": "$PWA_BG_COLOR",
            "theme_color": "$PWA_THEME_COLOR",
            "icons": [
              {
                "src": "$PWA_ICON_URL",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any"
              }
            ]
          }
          MANIFESTEOF
          
          # 构建缓存列表
          cache_list=""
          for cdn in "${CDNS[@]}"; do
            IFS=':' read -r name remote_url local_path <<< "$cdn"
            cache_list="$cache_list
            '$local_path',"
          done
          
          # 生成 Service Worker
          cat > build/sw.js << SWEOF
          const CACHE_NAME = 'rp-hub-v1';
          const urlsToCache = [
            './',
            './index.html',
            './character/index.html',
            './assets/css/styles.css',
            './assets/js/app.js',
            './assets/js/utils.js',$cache_list
            './manifest.json'
          ];

          self.addEventListener('install', (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then((cache) => cache.addAll(urlsToCache))
            );
          });

          self.addEventListener('activate', (event) => {
            event.waitUntil(
              caches.keys().then((cacheNames) => {
                return Promise.all(
                  cacheNames.map((cacheName) => {
                    if (cacheName !== CACHE_NAME) {
                      return caches.delete(cacheName);
                    }
                  })
                );
              })
            );
          });

          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request)
                .then((response) => {
                  if (response) {
                    return response;
                  }
                  return fetch(event.request).then((response) => {
                    if (!response || response.status !== 200 || response.type !== 'basic') {
                      return response;
                    }
                    let responseToCache = response.clone();
                    caches.open(CACHE_NAME)
                      .then((cache) => {
                        cache.put(event.request, responseToCache);
                      });
                    return response;
                  });
                })
            );
          });
          SWEOF
          
          # 更新 index.html 添加 PWA 标签
          cp build/index.html build/temp.html
          sed -i "s|<title>Roleplay Hub</title>|<title>Roleplay Hub</title><link rel=\"manifest\" href=\"./manifest.json\"><meta name=\"theme-color\" content=\"$PWA_THEME_COLOR\"><meta name=\"apple-mobile-web-app-capable\" content=\"yes\"><meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\"><link rel=\"apple-touch-icon\" href=\"$PWA_ICON_URL\">|" build/temp.html
          sed -i 's|</body>|    <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js")}</script>\n</body>|g' build/temp.html
          mv build/temp.html build/index.html
          
          echo "Build completed"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
