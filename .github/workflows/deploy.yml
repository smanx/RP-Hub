name: Sync & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repository
        run: |
          git remote add upstream https://github.com/STA1N156/RP-Hub.git || true
          git fetch upstream main
          git merge upstream/main --allow-unrelated-histories -X theirs || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync with upstream" || true
          git push || true

  build:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare build directory
        run: |
          mkdir -p build
          cp -r index.html character assets build/

      - name: Generate PWA manifest
        run: |
          cat > build/manifest.json << 'EOF'
          {
            "name": "Roleplay Hub",
            "short_name": "RP Hub",
            "description": "一款纯前端运行的本地角色扮演（Roleplay）对话和角色卡生成工具",
            "start_url": "/",
            "display": "standalone",
            "background_color": "#f9fafb",
            "theme_color": "#3b82f6",
            "icons": [
              {
                "src": "https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=3b82f6",
                "sizes": "512x512",
                "type": "image/svg+xml",
                "purpose": "any"
              }
            ]
          }
          EOF

      - name: Generate Service Worker
        run: |
          cat > build/sw.js << 'EOF'
          const CACHE_NAME = 'rp-hub-v1';
          const urlsToCache = [
            '/',
            '/index.html',
            '/character/index.html',
            '/assets/css/styles.css',
            '/assets/js/app.js',
            '/assets/js/utils.js'
          ];

          self.addEventListener('install', (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME)
                .then((cache) => cache.addAll(urlsToCache))
            );
          });

          self.addEventListener('fetch', (event) => {
            event.respondWith(
              caches.match(event.request)
                .then((response) => response || fetch(event.request))
            );
          });
          EOF

      - name: Update index.html to add PWA support
        run: |
          if [ -f build/index.html ]; then
            python3 << 'PYTHON'
            with open('build/index.html', 'r', encoding='utf-8') as f:
                content = f.read()
            
            # 添加manifest和相关标签
            if '<link rel="manifest"' not in content:
                content = content.replace(
                    '<title>Roleplay Hub</title>',
                    '''<title>Roleplay Hub</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=3b82f6">'''
                )
            
            # 添加service worker脚本
            if 'serviceWorker' not in content:
                content = content.replace(
                    '</body>',
                    '''<script>
        if('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js');
        }
      </script>
</body>'''
                )
            
            with open('build/index.html', 'w', encoding='utf-8') as f:
                f.write(content)
            print('Updated index.html with PWA support')
PYTHON
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
