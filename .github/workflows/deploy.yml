name: Sync & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream repository
        run: |
          git remote add upstream https://github.com/STA1N156/RP-Hub.git || true
          git fetch upstream main
          git merge upstream/main --allow-unrelated-histories -X theirs || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync with upstream" || true
          git push || true

  build:
    runs-on: ubuntu-latest
    needs: sync
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare build directory
        run: |
          mkdir -p build/libs
          cp -r index.html character assets build/

      - name: Download remote CDN resources
        run: |
          cd build
          
          # Download Tailwind CSS
          curl -sL "https://cdn.tailwindcss.com" -o libs/tailwindcss.js
          
          # Download Vue 3
          curl -sL "https://unpkg.com/vue@3/dist/vue.global.prod.js" -o libs/vue.js
          
          # Download Marked
          curl -sL "https://cdn.jsdelivr.net/npm/marked/marked.min.js" -o libs/marked.js
          
          # Download DOMPurify
          curl -sL "https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js" -o libs/purify.js
          
          # Download SortableJS
          curl -sL "https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js" -o libs/sortable.js
          
          echo "Downloaded all CDN resources"

      - name: Replace remote URLs in index.html
        run: |
          cd build
          
          # Create a Python script to update HTML
          cat > update_html.py << 'PYEOF'
          import re
          import os

          # Read index.html
          with open('index.html', 'r', encoding='utf-8') as f:
              content = f.read()

          # Replace CDN URLs with local paths
          replacements = [
              ('https://cdn.tailwindcss.com', './libs/tailwindcss.js'),
              ('https://unpkg.com/vue@3/dist/vue.global.prod.js', './libs/vue.js'),
              ('https://cdn.jsdelivr.net/npm/marked/marked.min.js', './libs/marked.js'),
              ('https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js', './libs/purify.js'),
              ('https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js', './libs/sortable.js'),
          ]

          for old_url, new_path in replacements:
              content = content.replace(f'src="{old_url}"', f'src="{new_path}"')

          # Write back
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)

          print("Replaced CDN URLs with local paths")
          PYEOF
          
          python3 update_html.py
          rm update_html.py

      - name: Replace remote URLs in character/index.html
        run: |
          if [ -f build/character/index.html ]; then
            cd build
            cat > update_char_html.py << 'PYEOF'
            import re
            import os

            with open('character/index.html', 'r', encoding='utf-8') as f:
                content = f.read()

            replacements = [
                ('https://cdn.tailwindcss.com', '../libs/tailwindcss.js'),
                ('https://unpkg.com/vue@3/dist/vue.global.prod.js', '../libs/vue.js'),
                ('https://cdn.jsdelivr.net/npm/marked/marked.min.js', '../libs/marked.js'),
                ('https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js', '../libs/purify.js'),
                ('https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js', '../libs/sortable.js'),
            ]

            for old_url, new_path in replacements:
                content = content.replace(f'src="{old_url}"', f'src="{new_path}"')

            with open('character/index.html', 'w', encoding='utf-8') as f:
                f.write(content)
            print("Replaced CDN URLs in character/index.html")
            PYEOF
            python3 update_char_html.py
            rm update_char_html.py
          fi

      - name: Generate PWA manifest
        run: |
          echo '{' > build/manifest.json
          echo '  "name": "Roleplay Hub",' >> build/manifest.json
          echo '  "short_name": "RP Hub",' >> build/manifest.json
          echo '  "description": "一款纯前端运行的本地角色扮演（Roleplay）对话和角色卡生成工具",' >> build/manifest.json
          echo '  "start_url": "./",' >> build/manifest.json
          echo '  "display": "standalone",' >> build/manifest.json
          echo '  "background_color": "#f9fafb",' >> build/manifest.json
          echo '  "theme_color": "#1f2937",' >> build/manifest.json
          echo '  "icons": [' >> build/manifest.json
          echo '    {' >> build/manifest.json
          echo '      "src": "https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=1f2937",' >> build/manifest.json
          echo '      "sizes": "512x512",' >> build/manifest.json
          echo '      "type": "image/svg+xml",' >> build/manifest.json
          echo '      "purpose": "any"' >> build/manifest.json
          echo '    }' >> build/manifest.json
          echo '  ]' >> build/manifest.json
          echo '}' >> build/manifest.json

      - name: Generate Service Worker with local libs
        run: |
          echo "const CACHE_NAME = 'rp-hub-v1';" > build/sw.js
          echo "const urlsToCache = [" >> build/sw.js
          echo "  './'," >> build/sw.js
          echo "  './index.html'," >> build/sw.js
          echo "  './character/index.html'," >> build/sw.js
          echo "  './assets/css/styles.css'," >> build/sw.js
          echo "  './assets/js/app.js'," >> build/sw.js
          echo "  './assets/js/utils.js'," >> build/sw.js
          echo "  './libs/tailwindcss.js'," >> build/sw.js
          echo "  './libs/vue.js'," >> build/sw.js
          echo "  './libs/marked.js'," >> build/sw.js
          echo "  './libs/purify.js'," >> build/sw.js
          echo "  './libs/sortable.js'" >> build/sw.js
          echo "];" >> build/sw.js
          echo "" >> build/sw.js
          echo "self.addEventListener('install', (event) => {" >> build/sw.js
          echo "  event.waitUntil(" >> build/sw.js
          echo "    caches.open(CACHE_NAME)" >> build/sw.js
          echo "      .then((cache) => cache.addAll(urlsToCache))" >> build/sw.js
          echo "  );" >> build/sw.js
          echo "});" >> build/sw.js
          echo "" >> build/sw.js
          echo "self.addEventListener('fetch', (event) => {" >> build/sw.js
          echo "  event.respondWith(" >> build/sw.js
          echo "    caches.match(event.request)" >> build/sw.js
          echo "      .then((response) => response || fetch(event.request))" >> build/sw.js
          echo "  );" >> build/sw.js
          echo "});" >> build/sw.js

      - name: Update index.html with PWA
        run: |
          if [ -f build/index.html ]; then
            cp build/index.html build/temp.html
            
            sed -i 's|<title>Roleplay Hub</title>|<title>Roleplay Hub</title><link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#1f2937"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=rp-hub&backgroundColor=1f2937">|' build/temp.html
            
            awk '/<\/body>/{print "    <script>if(\"serviceWorker\"in navigator){navigator.serviceWorker.register(\"./sw.js\")}</script>"}1' build/temp.html > build/index.html
            
            rm build/temp.html
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
