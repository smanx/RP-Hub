<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Card Marker · 角色卡编辑器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-0: #0b0d10;
    --bg-1: #11141a;
    --bg-2: #161a22;
    --bg-3: #1d222c;
    --bg-4: #252b37;
    --line: #2a3140;
    --line-soft: #1f2530;
    --ink-0: #e8eaf0;
    --ink-1: #b6bcc9;
    --ink-2: #7a8194;
    --ink-3: #525968;
    --accent: #d6ff5c;
    --accent-ink: #0b0d10;
    --accent-soft: rgba(214, 255, 92, 0.12);
    --warn: #ffb454;
    --err: #ff6b6b;
    --ok: #7ee787;
    --shadow-1: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.35);
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 800px at 20% -10%, #161a26 0%, var(--bg-0) 60%) fixed;
    color: var(--ink-0);
    font-family: 'Noto Sans SC', 'Fraunces', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 8px; border: 2px solid var(--bg-0); }
  ::-webkit-scrollbar-thumb:hover { background: #3a4253; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 60px 1fr;
    height: 100vh;
  }
  header.topbar {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 18px;
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border-bottom: 1px solid var(--line-soft);
    backdrop-filter: blur(8px);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: -0.01em;
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-soft);
  }
  .brand .sub {
    color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    margin-left: 6px;
    letter-spacing: 0.02em;
  }
  .path {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-2);
    padding: 6px 12px;
    background: var(--bg-1);
    border: 1px solid var(--line-soft);
    border-radius: 8px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  .path .label { color: var(--ink-3); margin-right: 8px; }
  .path .val { color: var(--ink-1); }
  .path .empty { color: var(--ink-3); font-style: italic; }

  button.btn {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--ink-0);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  button.btn:hover { background: var(--bg-3); border-color: #353c4d; transform: translateY(-1px); }
  button.btn:active { transform: translateY(0); }
  button.btn.primary {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: var(--accent);
    font-weight: 600;
  }
  button.btn.primary:hover { background: #e3ff7a; border-color: #e3ff7a; }
  button.btn.ghost { background: transparent; border-color: var(--line-soft); color: var(--ink-1); }
  button.btn.ghost:hover { background: var(--bg-2); color: var(--ink-0); }
  button.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button.btn .icon { width: 14px; height: 14px; }

  /* Sidebar */
  aside.sidebar {
    background: var(--bg-1);
    border-right: 1px solid var(--line-soft);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .side-head {
    padding: 14px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line-soft);
  }
  .side-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-2);
    font-weight: 600;
  }
  .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
  }
  .list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .card-item {
    padding: 12px 14px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 4px;
    border: 1px solid transparent;
    transition: background 0.12s, border-color 0.12s, transform 0.12s;
  }
  .card-item:hover { background: var(--bg-2); }
  .card-item.active {
    background: var(--bg-3);
    border-color: var(--line);
  }
  .card-item .name {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink-0);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    margin-bottom: 4px;
  }
  .card-item .meta {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge.ok { background: rgba(126, 231, 135, 0.12); color: var(--ok); }
  .badge.warn { background: rgba(255, 180, 84, 0.12); color: var(--warn); }
  .badge.err { background: rgba(255, 107, 107, 0.12); color: var(--err); }
  .badge.muted { background: var(--bg-3); color: var(--ink-2); }
  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: var(--ink-2);
    font-size: 13px;
  }
  .empty-state .ico { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

  /* Main */
  main.workspace {
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .ws-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: var(--ink-2);
    padding: 40px;
  }
  .ws-empty h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    color: var(--ink-1);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .ws-empty p { margin: 0; max-width: 440px; text-align: center; }
  .ws-empty .features {
    display: flex; gap: 24px;
    margin-top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
  }
  .ws-empty .features span { display: flex; align-items: center; gap: 6px; }
  .ws-empty .features span::before {
    content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
  }

  .ws-loaded {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(280px, 380px) 1fr;
    overflow: hidden;
  }
  .preview {
    border-right: 1px solid var(--line-soft);
    padding: 20px;
    overflow-y: auto;
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
  }
  .preview .frame {
    background:
      linear-gradient(45deg, #1a1f2a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1f2a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1f2a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1f2a 75%);
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
    background-color: #14181f;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: var(--shadow-1);
    margin-bottom: 18px;
  }
  .preview .frame img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }
  .meta-card {
    background: var(--bg-1);
    border: 1px solid var(--line-soft);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }
  .meta-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-2);
    margin: 0 0 12px;
    font-weight: 600;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 12px;
  }
  .meta-row + .meta-row { border-top: 1px dashed var(--line-soft); }
  .meta-row .k { color: var(--ink-2); }
  .meta-row .v { color: var(--ink-0); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .meta-row .v.mono-w { word-break: break-all; text-align: right; max-width: 60%; }

  .editor {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-0);
  }
  .editor-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-1);
    gap: 12px;
  }
  .editor-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-1);
    min-width: 0;
  }
  .editor-title .file-ico {
    color: var(--accent);
    font-weight: 600;
  }
  .editor-title .fname {
    color: var(--ink-0);
    font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .editor-actions { display: flex; gap: 8px; }
  textarea.json-edit {
    flex: 1;
    width: 100%;
    background: var(--bg-0);
    color: var(--ink-0);
    border: none;
    outline: none;
    padding: 18px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.65;
    resize: none;
    tab-size: 2;
  }
  textarea.json-edit.invalid { background: rgba(255, 107, 107, 0.04); }
  .status-bar {
    border-top: 1px solid var(--line-soft);
    background: var(--bg-1);
    padding: 8px 18px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-2);
    min-height: 36px;
  }
  .status-bar .left { display: flex; align-items: center; gap: 14px; }
  .status-bar .msg { display: flex; align-items: center; gap: 6px; }
  .status-bar .msg.ok { color: var(--ok); }
  .status-bar .msg.err { color: var(--err); }
  .status-bar .msg.warn { color: var(--warn); }
  .status-bar .right { display: flex; align-items: center; gap: 14px; }
  .status-bar .indicator { display: flex; align-items: center; gap: 5px; }
  .status-bar .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ink-3);
  }
  .status-bar .dot.ok { background: var(--ok); }
  .status-bar .dot.err { background: var(--err); }
  .status-bar .dot.warn { background: var(--warn); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-3);
    border: 1px solid var(--line);
    color: var(--ink-0);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: rgba(126, 231, 135, 0.4); }
  .toast.err { border-color: rgba(255, 107, 107, 0.4); }
  .toast.warn { border-color: rgba(255, 180, 84, 0.4); }

  .nope {
    padding: 40px;
    text-align: center;
    color: var(--ink-2);
    max-width: 520px;
    margin: 80px auto 0;
  }
  .nope h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 28px; color: var(--ink-1); }
  .nope code {
    background: var(--bg-2); padding: 2px 6px; border-radius: 4px; font-size: 12px;
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>Card Marker</span>
      <span class="sub">/ editor</span>
    </div>
    <div class="path" id="path">
      <span class="label">root</span>
      <span class="empty" id="path-val">— 未选择目录 —</span>
    </div>
    <button class="btn ghost" id="btn-refresh" disabled>
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>
      刷新
    </button>
    <button class="btn primary" id="btn-pick">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      选择目录
    </button>
  </header>

  <aside class="sidebar">
    <div class="side-head">
      <div class="side-title">角色卡</div>
      <div class="count" id="count">0</div>
    </div>
    <div class="list" id="list">
      <div class="empty-state">
        <div class="ico">⊹</div>
        <div>选择 <code style="color:var(--accent);background:var(--bg-2);padding:1px 6px;border-radius:4px;font-size:11px;">cards/</code> 目录以开始</div>
      </div>
    </div>
  </aside>

  <main class="workspace" id="workspace">
    <div class="ws-empty" id="ws-empty">
      <h2>没有选中的角色卡</h2>
      <p>从左侧列表中选择一张卡片，或在工具栏中打开 <code>cards/</code> 目录开始编辑。</p>
      <div class="features">
        <span>编辑 JSON</span>
        <span>预览 PNG</span>
        <span>一键回写</span>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 *  Card Marker Editor
 *  - File System Access API for direct read/write
 *  - Embedded PNG tEXt chunk read/write (Base64 + CRC32)
 * ============================================================ */

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const state = {
  dirHandle: null,
  dirName: '',
  cards: [],          // [{ handle, name, jsonHandle, pngHandle, data, hasWatermark, fileSize }]
  activeIndex: -1,
  dirty: false,
  originalJson: '',
  saving: false,
};

const els = {
  pickBtn: $('#btn-pick'),
  refreshBtn: $('#btn-refresh'),
  path: $('#path-val'),
  list: $('#list'),
  count: $('#count'),
  workspace: $('#workspace'),
  wsEmpty: $('#ws-empty'),
  toast: $('#toast'),
};

const SUPPORTS_FSA = 'showDirectoryPicker' in window;

/* ---------------- Toast ---------------- */
let toastTimer = null;
function toast(msg, kind = 'ok', ms = 2400) {
  els.toast.className = `toast show ${kind}`;
  els.toast.textContent = msg;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => els.toast.classList.remove('show'), ms);
}

/* ---------------- File System Access API ---------------- */
async function pickDirectory() {
  if (!SUPPORTS_FSA) {
    renderUnsupported();
    return;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    state.dirHandle = handle;
    state.dirName = handle.name;
    els.path.textContent = handle.name;
    els.path.classList.remove('empty');
    els.refreshBtn.disabled = false;
    await scanDirectory();
    toast(`已加载 ${state.cards.length} 张卡片`, 'ok');
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error(e);
      toast('打开目录失败: ' + e.message, 'err');
    }
  }
}

async function scanDirectory() {
  state.cards = [];
  state.activeIndex = -1;
  els.list.innerHTML = '';
  els.count.textContent = '…';

  for await (const [name, handle] of state.dirHandle.entries()) {
    if (handle.kind !== 'directory') continue;
    if (name.startsWith('.')) continue;
    try {
      const card = await loadCardDir(handle, name);
      if (card) state.cards.push(card);
    } catch (e) {
      console.warn('skip', name, e);
    }
  }

  // sort by name
  state.cards.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
  renderList();
  els.count.textContent = String(state.cards.length).padStart(2, '0');
}

async function loadCardDir(dirHandle, name) {
  let jsonHandle = null, pngHandle = null;
  for await (const [n, h] of dirHandle.entries()) {
    if (h.kind !== 'file') continue;
    if (n.toLowerCase().endsWith('.json') && !jsonHandle) jsonHandle = h;
    else if (n.toLowerCase().endsWith('.png') && !pngHandle) pngHandle = h;
  }
  if (!jsonHandle && !pngHandle) return null;

  let data = null, hasWatermark = false, hasError = false;
  let fileSize = 0;
  let pngBytes = null;
  let source = 'none';  // 'json' | 'png' | 'none'

  if (jsonHandle) {
    try {
      const file = await jsonHandle.getFile();
      const jsonText = await file.text();
      data = JSON.parse(jsonText);
      hasWatermark = checkWatermark(data);
      source = 'json';
    } catch (e) {
      hasError = true;
    }
  }
  if (pngHandle) {
    const file = await pngHandle.getFile();
    fileSize = file.size;
    pngBytes = new Uint8Array(await file.arrayBuffer());
    if (!data) {
      try {
        const parsed = parsePngCharacterData(pngBytes);
        data = parsed.data;
        hasWatermark = checkWatermark(data);
        source = 'png';
      } catch (e) {
        if (!jsonHandle) hasError = true;
      }
    }
  }

  return {
    dirHandle,
    name,
    displayName: data?.name || name,
    jsonHandle, pngHandle,
    pngBytes, data,
    hasWatermark,
    hasError,
    fileSize,
    source,
  };
}

function checkWatermark(obj) {
  const probe = obj?.data || obj || {};
  const w = probe.extensions?.rp_hub_watermark;
  return typeof w === 'string' && w.trim().toLowerCase() === 'rp-hub';
}

function renderList() {
  if (state.cards.length === 0) {
    els.list.innerHTML = `
      <div class="empty-state">
        <div class="ico">∅</div>
        <div>此目录下未找到角色卡</div>
      </div>`;
    return;
  }
  els.list.innerHTML = '';
  state.cards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'card-item' + (idx === state.activeIndex ? ' active' : '');
    const sizeKb = (card.fileSize / 1024).toFixed(0);
    const waterBadge = card.hasError
      ? '<span class="badge err">解析失败</span>'
      : card.hasWatermark
        ? '<span class="badge ok">RP-Hub</span>'
        : '<span class="badge warn">未水印</span>';
    const fileBadge = card.jsonHandle && card.pngHandle
      ? '<span class="badge muted">json+png</span>'
      : card.pngHandle
        ? '<span class="badge muted">png</span>'
        : '<span class="badge muted">json</span>';
    const sourceBadge = card.source === 'json'
      ? '<span class="badge ok" title="编辑器中的 JSON 来自 .json 文件">源:JSON</span>'
      : card.source === 'png'
        ? '<span class="badge warn" title="无 .json 文件，编辑器显示从 PNG 解析的内容">源:PNG</span>'
        : '';
    div.innerHTML = `
      <div class="name">${escapeHtml(card.displayName)}</div>
      <div class="meta">
        ${waterBadge}
        ${fileBadge}
      </div>
      <div class="meta" style="margin-top:6px">
        ${sourceBadge}
        <span style="margin-left:auto;color:var(--ink-3)">${sizeKb}kb</span>
      </div>
    `;
    div.addEventListener('click', () => selectCard(idx));
    els.list.appendChild(div);
  });
}

function selectCard(idx) {
  if (state.dirty && idx !== state.activeIndex) {
    if (!confirm('当前卡片有未保存的修改，确定切换吗？')) return;
  }
  state.activeIndex = idx;
  state.dirty = false;
  state.originalJson = '';
  renderList();
  renderEditor();
}

function renderEditor() {
  if (state.activeIndex < 0) {
    els.workspace.innerHTML = '';
    els.workspace.appendChild(els.wsEmpty);
    return;
  }
  const card = state.cards[state.activeIndex];
  const jsonName = card.jsonHandle ? card.jsonHandle.name : '(无 JSON)';
  const pngName = card.pngHandle ? card.pngHandle.name : '(无 PNG)';

  const data = card.data || {};
  const root = data.data || data;
  const spec = root.spec || '—';
  const charName = root.name || card.name;
  const hasWm = card.hasWatermark;
  const hasErr = card.hasError;
  const sizeKb = (card.fileSize / 1024).toFixed(1);

  let jsonText = '';
  let jsonValid = true;
  if (card.jsonHandle) {
    // We'll fetch fresh on save; for now show parsed data formatted
    jsonText = JSON.stringify(data, null, 2);
    state.originalJson = jsonText;
  }

  const tags = root.tags || [];
  const tagHtml = Array.isArray(tags) && tags.length
    ? tags.slice(0, 4).map(t => `<span class="badge muted">${escapeHtml(String(t))}</span>`).join(' ')
    : '<span class="badge muted">无标签</span>';

  const imgSrc = card.pngBytes
    ? URL.createObjectURL(new Blob([card.pngBytes], { type: 'image/png' }))
    : '';

  els.workspace.innerHTML = `
    <div class="ws-loaded">
      <div class="preview">
        <div class="frame">
          ${imgSrc
            ? `<img id="png-preview" src="${imgSrc}" alt="preview" />`
            : '<div style="padding:40px;text-align:center;color:var(--ink-3);">无 PNG</div>'}
        </div>
        <div class="meta-card">
          <h3>卡片信息</h3>
          <div class="meta-row"><span class="k">名称</span><span class="v">${escapeHtml(charName)}</span></div>
          <div class="meta-row"><span class="k">规范</span><span class="v">${escapeHtml(spec)}</span></div>
          <div class="meta-row"><span class="k">水印</span><span class="v">${
            hasErr ? '<span class="badge err">解析失败</span>'
            : hasWm ? '<span class="badge ok">rp-hub ✓</span>'
            : '<span class="badge warn">未设置</span>'}</span></div>
          <div class="meta-row"><span class="k">PNG</span><span class="v">${escapeHtml(pngName)}</span></div>
          <div class="meta-row"><span class="k">大小</span><span class="v">${sizeKb} KB</span></div>
          <div class="meta-row" style="display:block">
            <span class="k" style="display:block;margin-bottom:6px;">标签</span>
            <span class="v" style="display:flex;flex-wrap:wrap;gap:4px;">${tagHtml}</span>
          </div>
        </div>
      </div>
      <div class="editor">
        <div class="editor-head">
          <div class="editor-title">
            <span class="file-ico">{ }</span>
            <span class="fname">${escapeHtml(jsonName)}</span>
          </div>
          <div class="editor-actions">
            <button class="btn ghost" id="btn-format" title="格式化 JSON">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="14" y2="12"/><line x1="4" y1="18" x2="18" y2="18"/></svg>
              格式化
            </button>
            <button class="btn ghost" id="btn-revert" title="放弃修改">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>
              还原
            </button>
            <button class="btn primary" id="btn-save" title="保存到 JSON 和 PNG">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              保存
            </button>
          </div>
        </div>
        <textarea class="json-edit" id="json-edit" spellcheck="false" ${card.jsonHandle ? '' : 'placeholder="此卡片无 JSON 文件"'}>${escapeHtml(jsonText)}</textarea>
        <div class="status-bar">
          <div class="left">
            <div class="indicator"><span class="dot" id="valid-dot"></span><span id="valid-text">—</span></div>
            <div class="msg" id="status-msg"></div>
          </div>
          <div class="right">
            <span id="char-count">0 字符</span>
            <span id="line-count">0 行</span>
          </div>
        </div>
      </div>
    </div>
  `;

  const ta = $('#json-edit');
  const validDot = $('#valid-dot');
  const validText = $('#valid-text');
  const charCount = $('#char-count');
  const lineCount = $('#line-count');
  const statusMsg = $('#status-msg');

  function updateStatus() {
    const txt = ta.value;
    charCount.textContent = `${txt.length.toLocaleString()} 字符`;
    lineCount.textContent = `${txt.split('\n').length} 行`;
    state.dirty = txt !== state.originalJson;
    try {
      JSON.parse(txt);
      ta.classList.remove('invalid');
      validDot.className = 'dot ok';
      validText.textContent = 'JSON 有效';
      $('#btn-save').disabled = false;
    } catch (e) {
      ta.classList.add('invalid');
      validDot.className = 'dot err';
      validText.textContent = 'JSON 错误: ' + e.message;
      $('#btn-save').disabled = true;
    }
  }

  ta.addEventListener('input', updateStatus);
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const s = ta.selectionStart, en = ta.selectionEnd;
      ta.value = ta.value.slice(0, s) + '  ' + ta.value.slice(en);
      ta.selectionStart = ta.selectionEnd = s + 2;
      updateStatus();
    }
  });
  updateStatus();

  $('#btn-format').addEventListener('click', () => {
    try {
      const obj = JSON.parse(ta.value);
      ta.value = JSON.stringify(obj, null, 2);
      updateStatus();
      toast('已格式化', 'ok', 1200);
    } catch (e) {
      toast('JSON 错误，无法格式化', 'err');
    }
  });
  $('#btn-revert').addEventListener('click', () => {
    if (!state.dirty) return;
    if (!confirm('放弃所有未保存的修改？')) return;
    ta.value = state.originalJson;
    updateStatus();
    toast('已还原', 'ok', 1200);
  });
  $('#btn-save').addEventListener('click', () => saveCard());

  // Warn on close
  window.onbeforeunload = state.dirty ? (e) => { e.preventDefault(); e.returnValue = ''; } : null;
}

async function saveCard() {
  if (state.saving) return;
  const card = state.cards[state.activeIndex];
  const ta = $('#json-edit');
  let jsonData;
  try {
    jsonData = JSON.parse(ta.value);
  } catch (e) {
    toast('JSON 错误: ' + e.message, 'err');
    return;
  }

  // Ensure watermark
  const root = jsonData.data || jsonData;
  if (!root.extensions || typeof root.extensions !== 'object') root.extensions = {};
  if (!root.extensions.rp_hub_watermark) root.extensions.rp_hub_watermark = 'rp-hub';
  if (jsonData.data) jsonData.data = root;
  const finalText = JSON.stringify(jsonData, null, 2);

  state.saving = true;
  const saveBtn = $('#btn-save');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<span>保存中…</span>';
  const statusMsg = $('#status-msg');
  statusMsg.className = 'msg';
  statusMsg.textContent = '正在写入文件…';

  try {
    // 1. Write JSON file
    if (card.jsonHandle) {
      const w = await card.jsonHandle.createWritable();
      await w.write(finalText);
      await w.close();
    } else {
      // create new
      const baseName = (card.pngHandle?.name || card.name).replace(/\.png$/i, '');
      card.jsonHandle = await card.dirHandle.getFileHandle(baseName + '.json', { create: true });
      const w = await card.jsonHandle.createWritable();
      await w.write(finalText);
      await w.close();
    }

    // 2. Inject into PNG
    if (card.pngHandle) {
      // Re-read PNG if we don't have bytes yet
      if (!card.pngBytes) {
        const file = await card.pngHandle.getFile();
        card.pngBytes = new Uint8Array(await file.arrayBuffer());
      }
      const payload = encodeBase64Utf8(JSON.stringify(jsonData));
      const newPng = injectPngTextChunk(card.pngBytes, 'chara', payload);
      const w = await card.pngHandle.createWritable();
      await w.write(newPng);
      await w.close();
      card.pngBytes = newPng;

      // Update preview
      const img = $('#png-preview');
      if (img) {
        URL.revokeObjectURL(img.src);
        img.src = URL.createObjectURL(new Blob([newPng], { type: 'image/png' }));
      }
    } else {
      toast('已保存 JSON（无 PNG 可回写）', 'warn');
    }

    state.originalJson = finalText;
    ta.value = finalText;
    state.dirty = false;
    card.data = jsonData;
    card.hasWatermark = checkWatermark(jsonData);
    renderList();
    statusMsg.className = 'msg ok';
    statusMsg.textContent = '✓ 已保存 ' + new Date().toLocaleTimeString();
    toast('已保存并写入 PNG', 'ok');
  } catch (e) {
    console.error(e);
    statusMsg.className = 'msg err';
    statusMsg.textContent = '保存失败: ' + e.message;
    toast('保存失败: ' + e.message, 'err');
  } finally {
    state.saving = false;
    saveBtn.disabled = false;
    saveBtn.innerHTML = `
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      保存`;
  }
}

function renderUnsupported() {
  els.workspace.innerHTML = `
    <div class="nope">
      <h1>浏览器不支持</h1>
      <p>此编辑器使用 <code>File System Access API</code> 直接读写本地文件，需要 <code>Chrome</code> / <code>Edge</code> 等基于 Chromium 的浏览器（桌面版 86+）。</p>
      <p style="margin-top:14px;font-size:12px;">Firefox / Safari 暂不支持直接保存到本地文件，可改用命令行脚本 <code>node card-marker.js</code>。</p>
    </div>
  `;
}

/* ---------------- PNG tEXt chunk read/write ---------------- */

const PNG_SIGNATURE = [0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A];

function readPngChunks(buffer) {
  const bytes = new Uint8Array(buffer);
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  const chunks = {};
  let offset = 8;
  while (offset + 8 <= bytes.byteLength) {
    const length = view.getUint32(offset, false);
    const type = String.fromCharCode(
      view.getUint8(offset + 4),
      view.getUint8(offset + 5),
      view.getUint8(offset + 6),
      view.getUint8(offset + 7)
    );
    const dataStart = offset + 8;
    const dataEnd = dataStart + length;
    if (dataEnd + 4 > bytes.byteLength) break;
    const data = bytes.slice(dataStart, dataEnd);
    if (type === 'tEXt') {
      const i = data.indexOf(0);
      if (i !== -1) {
        chunks[textDecode(data.slice(0, i))] = textDecode(data.slice(i + 1));
      }
    } else if (type === 'iTXt') {
      let cursor = 0;
      while (cursor < data.length && data[cursor] !== 0) cursor += 1;
      const key = textDecode(data.slice(0, cursor));
      cursor += 1;
      if (cursor + 2 <= data.length) {
        const compressionFlag = data[cursor];
        cursor += 2;
        while (cursor < data.length && data[cursor] !== 0) cursor += 1;
        cursor += 1;
        while (cursor < data.length && data[cursor] !== 0) cursor += 1;
        cursor += 1;
        if (key && cursor < data.length && compressionFlag === 0) {
          chunks[key] = textDecode(data.slice(cursor));
        }
      }
    }
    offset += 12 + length;
  }
  return chunks;
}

function findPngCharacterPayload(chunks) {
  if (chunks.chara) return chunks.chara;
  if (chunks.ccv3) return chunks.ccv3;
  return Object.values(chunks).find((v) => {
    const t = String(v || '').trim();
    return t.length > 50 && (t.startsWith('{') || t.startsWith('ey'));
  }) || '';
}

function parseCharacterPayload(payload) {
  try { return JSON.parse(decodeBase64Utf8(payload)); }
  catch (_) { return JSON.parse(String(payload || '')); }
}

function parsePngCharacterData(buffer) {
  const chunks = readPngChunks(buffer);
  const payload = findPngCharacterPayload(chunks);
  if (!payload) throw new Error('No character data in PNG');
  return { chunks, payload, data: parseCharacterPayload(payload) };
}

function encodeBase64Utf8(value) {
  const bytes = textEncode(String(value ?? ''));
  let binary = '';
  for (let i = 0; i < bytes.length; i += 1) binary += String.fromCharCode(bytes[i]);
  return btoa(binary);
}

function decodeBase64Utf8(value) {
  try {
    const binary = atob(String(value || '').trim());
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
    return textDecode(bytes);
  } catch (_) { return String(value || ''); }
}

function textEncode(s) { return new TextEncoder().encode(s); }
function textDecode(b) { return new TextDecoder('utf-8').decode(b); }

const crc32Table = new Uint32Array(256);
for (let i = 0; i < 256; i += 1) {
  let c = i;
  for (let k = 0; k < 8; k += 1) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
  crc32Table[i] = c;
}
function crc32(bytes) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < bytes.length; i += 1) crc = (crc >>> 8) ^ crc32Table[(crc ^ bytes[i]) & 0xFF];
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function createTextChunk(key, value) {
  const type = textEncode('tEXt');
  const keyData = textEncode(key);
  const valueData = textEncode(value);
  const chunkData = new Uint8Array(keyData.length + 1 + valueData.length);
  chunkData.set(keyData, 0);
  chunkData[keyData.length] = 0;
  chunkData.set(valueData, keyData.length + 1);
  const crcInput = new Uint8Array(type.length + chunkData.length);
  crcInput.set(type, 0);
  crcInput.set(chunkData, type.length);
  const fullChunk = new Uint8Array(12 + chunkData.length);
  const view = new DataView(fullChunk.buffer);
  view.setUint32(0, chunkData.length, false);
  fullChunk.set(type, 4);
  fullChunk.set(chunkData, 8);
  view.setUint32(8 + chunkData.length, crc32(crcInput), false);
  return fullChunk;
}

function injectPngTextChunk(pngBuffer, key, value) {
  const pngBytes = new Uint8Array(pngBuffer);
  for (let i = 0; i < PNG_SIGNATURE.length; i += 1) {
    if (pngBytes[i] !== PNG_SIGNATURE[i]) throw new Error('Invalid PNG signature');
  }
  const view = new DataView(pngBytes.buffer, pngBytes.byteOffset, pngBytes.byteLength);
  const textChunk = createTextChunk(key, value);
  const removeTypes = new Set([key, 'chara', 'ccv3']);
  const kept = [pngBytes.slice(0, 8)];
  let offset = 8;
  while (offset + 8 <= pngBytes.byteLength) {
    const length = view.getUint32(offset, false);
    const type = String.fromCharCode(
      view.getUint8(offset + 4),
      view.getUint8(offset + 5),
      view.getUint8(offset + 6),
      view.getUint8(offset + 7)
    );
    const chunkEnd = offset + 12 + length;
    if (chunkEnd > pngBytes.byteLength) break;
    if (!removeTypes.has(type)) kept.push(pngBytes.slice(offset, chunkEnd));
    if (type === 'IHDR') kept.push(textChunk);
    offset = chunkEnd;
  }
  const totalLength = kept.reduce((s, c) => s + c.length, 0);
  const result = new Uint8Array(totalLength);
  let pos = 0;
  for (const c of kept) { result.set(c, pos); pos += c.length; }
  return result;
}

/* ---------------- Util ---------------- */
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

/* ---------------- Boot ---------------- */
els.pickBtn.addEventListener('click', pickDirectory);
els.refreshBtn.addEventListener('click', async () => {
  if (!state.dirHandle) return;
  els.refreshBtn.disabled = true;
  await scanDirectory();
  els.refreshBtn.disabled = false;
  toast('已刷新', 'ok', 1000);
});

if (!SUPPORTS_FSA) {
  renderUnsupported();
}
